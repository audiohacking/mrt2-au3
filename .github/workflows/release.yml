name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build

      - name: Configure
        shell: bash
        run: |
          source .venv/bin/activate
          cmake . -B build -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build and package AUv3 app
        shell: bash
        run: |
          source .venv/bin/activate
          cmake --build build --target package_mrt2_au -j"$(sysctl -n hw.ncpu)"

      - name: Print ccache stats
        shell: bash
        run: ccache -s

      - name: Rename release archive
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.ref_name }}"
          fi
          mv build/MRT2-AU3-macos-arm64.zip "build/MRT2-AU3-${VERSION}-macos-arm64.zip"
          ls -lh "build/MRT2-AU3-${VERSION}-macos-arm64.zip"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/MRT2-AU3-*-macos-arm64.zip
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MRT2-AU3-macos-arm64
          path: build/MRT2-AU3-*-macos-arm64.zip
          if-no-files-found: error

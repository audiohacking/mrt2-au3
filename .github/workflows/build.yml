name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-auv3:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build

      - name: Configure
        shell: bash
        run: |
          source .venv/bin/activate
          cmake . -B build -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DMAGENTART_DEBUG_LOG=ON

      - name: Build AUv3 targets
        shell: bash
        run: |
          source .venv/bin/activate
          cmake --build build --target finalize_mrt2_au -j"$(sysctl -n hw.ncpu)"

      - name: Print ccache stats
        shell: bash
        run: ccache -s
